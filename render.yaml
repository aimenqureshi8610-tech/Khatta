services:
  - type: web
    name: khaata
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: RESEND_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATA_DIR
        value: /var/data
